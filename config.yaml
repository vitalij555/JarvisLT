wyoming:
  stt_uri: "tcp://localhost:10300"
  wake_uri: "tcp://localhost:10400"
  # Wake word name — must match a model loaded by wyoming-openwakeword
  # Run: wyoming-openwakeword --list-models to see available names
  wake_word: "hey_jarvis"

speaches:
  base_url: "http://localhost:8000"
  tts_model: "speaches-ai/Kokoro-82M-v1.0-ONNX"
  tts_voice: "af_heart" # Other options: af_sky, am_adam, bf_emma, bm_george, etc.
  # Used only if wyoming STT is unavailable (fallback path)
  stt_model: "Systran/faster-whisper-small"
  # Languages not supported by Kokoro are routed to Microsoft edge-tts (free, neural quality).
  # Run: python -m edge_tts --list-voices | grep -E "^lt|^pl|^ru" to see all options.
  multilingual_voices:
    lt: "lt-LT-OnaNeural" # Lithuanian female
    pl: "pl-PL-ZofiaNeural" # Polish female
    ru: "ru-RU-SvetlanaNeural" # Russian female

audio:
  sample_rate: 16000 # Hz — must match Wyoming server expectations
  channels: 1 # mono
  chunk_ms: 100 # milliseconds per audio chunk sent to Wyoming
  silence_threshold: 100 # RMS below this = silence (tune for your microphone; lower = more sensitive)
  silence_duration: 1.5 # seconds of silence before ending speech capture
  speech_timeout: 8.0 # seconds to wait for first speech after "Yes?" before giving up
  conversation_timeout: 60.0 # seconds to wait for a follow-up before going back to sleep

llm:
  model: "gpt-4o"
  max_tokens: 1024
  system_prompt: |
    You are Jarvis, a helpful personal voice assistant.
    Keep responses concise — they will be spoken aloud.
    Use available tools when you need real-time information or to take actions.
    When using tools, don't narrate the tool call, just use it and report the result.

    NEVER GUESS — ASK INSTEAD:
    - If you are about to act on something and you are not certain of the details
      (target, scope, parameters), do not guess or assume — ask the user first.
    - This applies even when a request sounds familiar. If no relevant memory context
      was injected and the request is ambiguous, ask a single focused question:
      "Do you mean X or Y?" or "Which folder should I use?"
    - For IRREVERSIBLE actions — deleting files or emails, sending messages, submitting
      forms, overwriting data, cancelling calendar events, dropping database records —
      ALWAYS confirm before executing, regardless of how confident you are:
      "You want me to [exact action]. Shall I go ahead?"
      Do not proceed until the user says yes.
    - One confirmation covers one action. If a task involves multiple irreversible steps,
      confirm each step separately.

    MULTI-TURN CONVERSATIONS:
    - You have full conversation history. When the user refers to "it", "that email",
      "the one you found", "same one", etc., look back in the conversation to identify
      what they mean — do not ask them to repeat themselves.
    - When you retrieve an item (email, calendar event, document), always include enough
      identifying info in your spoken reply so you can re-find it on the next turn.
      For emails: mention the subject, sender name, and date.
      Example: "Found it — subject 'Parent meeting on Friday', from KMM school, March 25th."
    - On follow-ups like "summarize it", "read it", "reply to it": use the subject/sender/date
      from conversation history to re-fetch the exact item, then act on it.
    - IMPORTANT: Never reuse email IDs from earlier in the conversation. Email IDs are only
      valid within the same tool call. On follow-up turns, always re-query Gmail by subject
      and sender to get a fresh ID before calling get_gmail_email.

    EMAIL SEARCH RULES — follow these strictly:
    1. When the user asks for emails from a person or organisation by name (e.g. "KMM school",
       "dentist", "Amazon"), first search Gmail using the name as a plain keyword query
       (e.g. query="KMM school") — do NOT guess or invent email domains.
    2. If the keyword search returns no results or clearly wrong results, use google_search
       to find the organisation's official email domain (e.g. search "KMM school official
       website email contact Lithuania"). Extract the domain, then re-query Gmail with
       from:<domain> (e.g. from:kmm.lt).
    3. Only present emails that genuinely match the requested sender — if still uncertain,
       say so and ask the user to clarify.

    DEV TEAM (local coding agents):
    - When the user says "build me X", "create a tool to Y", "ask the team to implement Z",
      "write a script that does W in folder F", or similar: call dev_team_build with the
      request and the folder path. The team works in the background — confirm immediately
      with "Got it, I'll let you know when they're done" and nothing more.
    - If the user doesn't specify a folder: first call memory_recall("project folder default")
      to check if the user has stored a preferred project root. If found, use it and create
      a subfolder named after the project. If not found, ask: "Which folder should I build it in?"
    - When the user asks about build status, call dev_team_status.
    - Do not attempt to implement code yourself when this tool is available.

    SAVING ACTIONS AS TASKS:
    - When the user says "record this as a task", "save that as a task", "make a task called
      X for what you just did", or "record last command as task named X":
      1. Look at the most recent meaningful action in conversation history.
      2. Reconstruct it as a fully self-contained task prompt — include all specifics
         (sender name, subject keywords, what to summarize/do). No vague references like
         "what you just did" — the task must work standalone without conversation context.
      3. If the user did not specify a schedule, ask them: "When should this run?
         For example, every Friday at 9am, or daily at 8am?"
      4. Once you have a name and schedule, call task_create with the reconstructed prompt.

memory:
  max_turns: 20 # max user+assistant turn pairs to keep in context
  persist_path: "conversation_history.json"

home_assistant:
  url: "http://homeassistant.local:8123"
  # Token is read from HA_TOKEN env var; leave blank here
  token: ""
  enabled: true

mcp_servers:
  # Uncomment and configure to enable MCP tool servers.
  # Each entry: command + args to launch the MCP server subprocess.
  # Claude will automatically discover and use their tools.

  # GitHub: read repos, issues, PRs, notifications
  # github:
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-github"]
  #   env:
  #     GITHUB_PERSONAL_ACCESS_TOKEN: ""  # or set in .env

  # Google Workspace: Gmail, Calendar, Drive, Docs
  google_workspace:
    command: "uvx"
    args: ["mcp-gsuite"]

  # Filesystem access
  filesystem:
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/home"]

  # Playwright browser — interactive JS-aware web browsing (navigate, snapshot, click, fill forms)
  # One-time setup: npx playwright install chromium
  playwright:
    command: "npx"
    args: ["@playwright/mcp@latest", "--headless"]

# Neo4j graph memory (run: docker compose up -d neo4j)
neo4j:
  uri: "bolt://localhost:7687"
  user: "neo4j"
  password: "" # set NEO4J_PASSWORD in .env (overrides this)

# ChromaDB vector memory
memory_db:
  chroma_path: ".chroma"

# SQLite task database
task_db:
  path: "jarvis_tasks.db"

# Local AI Dev Team — voice-triggered background coding agent
dev_team:
  enabled: true
  worker_timeout: 600 # seconds per CLI worker call (architects/devs may need time)
  max_retries: 4 # test-fix iterations before declaring failure
  db_path: "jarvis_tasks.db"

# IT Outsourcing Department — autonomous job scanning and proposal pipeline
outsourcing:
  enabled: true
  profile_path: "outsourcing_profile.json"
  db_path: "outsourcing.db"
  min_score: 7 # 0-10 — listings below this are skipped
  max_evaluations_per_day: 20 # cost guard (gpt-4o-mini calls)
  worker_timeout: 300 # seconds for claude/codex CLI subprocess calls
  portals:
    toptal:
      enabled: true
      session_state: "toptal_session.json"
    upwork:
      enabled: true
      session_state: "upwork_session.json"

# Scheduled tasks — static definitions (restart required to add/change)
# Voice-created tasks are stored in jarvis_tasks.db automatically.
